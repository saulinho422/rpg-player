<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Player - Login</title>
    <meta name="description" content="Faça login no RPG Player — Sistema de Fichas D&D 5E. Entre na sua conta ou crie uma nova para começar sua aventura.">

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
    <link rel="manifest" href="img/site.webmanifest">
    <link rel="shortcut icon" href="img/favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cinzel+Decorative:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/login.css">
</head>

<body>
    <div class="login-container">
        <!-- Título Elaborado Medieval -->
        <div class="title-section">
            <div class="title-ornaments">
                <div class="ornament-left">⚜️</div>
                <div class="title-main">
                    <h1 class="main-title">
                        <span class="title-word">RPG</span>
                        <span class="title-separator">•</span>
                        <span class="title-word">PLAYER</span>
                    </h1>
                    <div class="title-subtitle">~ Sua Jornada Épica Começa Aqui ~</div>
                </div>
                <div class="ornament-right">⚜️</div>
            </div>
            <div class="title-decorative-line">
                <span class="line-ornament">═══════════</span>
                <span class="center-ornament">⚡</span>
                <span class="line-ornament">═══════════</span>
            </div>
        </div>

        <!-- Formulário de Login/Registro -->
        <div class="auth-container">
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Entrar</button>
                <button class="tab-btn" data-tab="register">Criar Conta</button>
            </div>

            <!-- Tab Login -->
            <div class="tab-content active" id="login-tab">
                <div class="google-section">
                    <button data-action="google-login" class="google-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path fill="#4285F4"
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path fill="#34A853"
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path fill="#FBBC05"
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                            <path fill="#EA4335"
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                        Entrar com Google
                    </button>
                </div>

                <div class="divider">
                    <span>ou</span>
                </div>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="loginEmail">Email:</label>
                        <input type="email" name="email" id="loginEmail" required>
                    </div>
                    <div class="input-group">
                        <label for="loginPassword">Senha:</label>
                        <input type="password" name="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="auth-btn">Entrar</button>
                </form>
                <!-- FIX #17 — Restaurar link "Esqueceu a senha?" -->
                <p style="text-align:center;margin-top:12px;font-size:0.82rem;">
                    <a href="#" id="forgotPasswordLink" style="color:rgba(212,175,55,0.75);text-decoration:underline;">Esqueceu a senha?</a>
                </p>
            </div>

            <!-- Reset Password section (hidden by default) -->
            <div id="reset-tab" style="display:none;">
                <p style="text-align:center;margin-bottom:16px;font-size:0.85rem;color:rgba(232,220,198,0.65);">
                    Informe seu email para receber o link de recuperação.
                </p>
                <form id="resetForm">
                    <div class="input-group">
                        <label for="resetEmail">Email:</label>
                        <input type="email" name="email" id="resetEmail" required>
                    </div>
                    <button type="submit" class="auth-btn">Enviar Link de Recuperação</button>
                </form>
                <p style="text-align:center;margin-top:12px;font-size:0.82rem;">
                    <a href="#" id="backToLoginLink" style="color:rgba(212,175,55,0.75);text-decoration:underline;">← Voltar ao Login</a>
                </p>
            </div>

            <!-- Tab Registro -->
            <div class="tab-content" id="register-tab">
                <div class="google-section">
                    <button data-action="google-login" class="google-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path fill="#4285F4"
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path fill="#34A853"
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path fill="#FBBC05"
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                            <path fill="#EA4335"
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                        Registrar com Google
                    </button>
                </div>

                <div class="divider">
                    <span>ou</span>
                </div>

                <form id="registerForm">
                    <div class="input-group">
                        <label for="registerEmail">Email:</label>
                        <input type="email" name="email" id="registerEmail" required>
                    </div>
                    <div class="input-group">
                        <label for="registerPassword">Senha:</label>
                        <input type="password" name="password" id="registerPassword" required>
                    </div>
                    <div class="input-group">
                        <label for="confirmPassword">Confirmar Senha:</label>
                        <input type="password" id="confirmPassword" required>
                    </div>
                    <button type="submit" class="auth-btn">Criar Conta</button>
                </form>
            </div>
        </div>

        <!-- Messages -->
        <div id="messages" class="messages"></div>
    </div>

    <script type="module" src="js/auth.js"></script>
    <script type="module">
        // FIX #17 — Esqueceu a senha
        import { auth } from './js/firebase-config.js'
        import { sendPasswordResetEmail } from 'firebase/auth'

        const authContainer  = document.querySelector('.auth-container')
        const loginTab       = document.getElementById('login-tab')
        const resetTab       = document.getElementById('reset-tab')
        const tabsEl         = document.querySelector('.auth-tabs')

        document.getElementById('forgotPasswordLink')?.addEventListener('click', (e) => {
            e.preventDefault()
            loginTab.style.display = 'none'
            if (tabsEl) tabsEl.style.display = 'none'
            resetTab.style.display = 'block'
        })

        document.getElementById('backToLoginLink')?.addEventListener('click', (e) => {
            e.preventDefault()
            resetTab.style.display = 'none'
            loginTab.style.display = 'block'
            if (tabsEl) tabsEl.style.display = 'flex'
        })

        document.getElementById('resetForm')?.addEventListener('submit', async (e) => {
            e.preventDefault()
            const email = document.getElementById('resetEmail').value
            const msgEl = document.getElementById('messages')
            try {
                await sendPasswordResetEmail(auth, email)
                if (msgEl) {
                    const m = document.createElement('div')
                    m.className = 'message success'
                    m.textContent = 'Link de recuperação enviado! Verifique seu email.'
                    msgEl.appendChild(m)
                    setTimeout(() => m.remove(), 5000)
                }
                // Volta ao login após 2s
                setTimeout(() => {
                    resetTab.style.display = 'none'
                    loginTab.style.display = 'block'
                    if (tabsEl) tabsEl.style.display = 'flex'
                }, 2000)
            } catch (err) {
                if (msgEl) {
                    const m = document.createElement('div')
                    m.className = 'message error'
                    m.textContent = err.code === 'auth/user-not-found'
                        ? 'Email não encontrado.' : 'Erro ao enviar link. Tente novamente.'
                    msgEl.appendChild(m)
                    setTimeout(() => m.remove(), 5000)
                }
            }
        })
    </script>
</body>

</html>
