<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - RPG Player</title>
    <link rel="stylesheet" href="styles/admin.css">
</head>

<body>

    <!-- HEADER -->
    <header class="admin-header">
        <div class="header-left">
            <a href="/dashboard.html" class="header-back">
                ← <span>Voltar</span>
            </a>
            <div class="header-title">
                <span class="shield-icon">🛡️</span>
                <h1>Painel Admin</h1>
            </div>
        </div>
        <div class="header-right">
            <div class="user-badge" id="userBadge">Carregando...</div>
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>
    </header>

    <!-- LAYOUT -->
    <div class="admin-layout">

        <!-- SIDEBAR -->
        <nav class="admin-sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Dados do Jogo</div>
                <button class="sidebar-item active" data-section="game-data">
                    <span class="item-icon">⚔️</span> Game Data
                </button>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">Comunidade</div>
                <button class="sidebar-item" data-section="users">
                    <span class="item-icon">👥</span> Usuários
                    <span class="item-count" id="sideUsersCount">-</span>
                </button>
                <button class="sidebar-item" data-section="characters">
                    <span class="item-icon">🎭</span> Personagens
                    <span class="item-count" id="sideCharsCount">-</span>
                </button>
                <button class="sidebar-item" data-section="campaigns">
                    <span class="item-icon">🎲</span> Campanhas
                    <span class="item-count" id="sideCampsCount">-</span>
                </button>
            </div>
        </nav>

        <!-- CONTENT -->
        <main class="admin-content">

            <!-- KPI ROW -->
            <div class="kpi-row">
                <div class="kpi-card">
                    <div class="kpi-icon">📊</div>
                    <div class="kpi-value" id="totalGameData">-</div>
                    <div class="kpi-label">Itens no Jogo</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon">👥</div>
                    <div class="kpi-value" id="usersCount">-</div>
                    <div class="kpi-label">Usuários</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon">🎭</div>
                    <div class="kpi-value" id="charactersCount">-</div>
                    <div class="kpi-label">Personagens</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon">🎲</div>
                    <div class="kpi-value" id="campaignsCount">-</div>
                    <div class="kpi-label">Campanhas</div>
                </div>
            </div>

            <!-- GAME DATA CARDS -->
            <div class="section-bar">
                <h2>⚔️ Dados do Jogo</h2>
            </div>

            <div class="cards-grid">
                <div class="admin-card">
                    <div class="card-header">
                        <div class="card-title"><span class="card-emoji">⚔️</span> Classes</div>
                    </div>
                    <div class="card-count" id="classesCount">-</div>
                    <div class="card-actions">
                        <button class="btn btn-gold" onclick="openModal('classes')">+ Adicionar</button>
                        <button class="btn btn-outline" onclick="viewTable('classes')">Ver Todos</button>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="card-header">
                        <div class="card-title"><span class="card-emoji">🧝</span> Raças</div>
                    </div>
                    <div class="card-count" id="racesCount">-</div>
                    <div class="card-actions">
                        <button class="btn btn-gold" onclick="openModal('races')">+ Adicionar</button>
                        <button class="btn btn-outline" onclick="viewTable('races')">Ver Todos</button>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="card-header">
                        <div class="card-title"><span class="card-emoji">📜</span> Antecedentes</div>
                    </div>
                    <div class="card-count" id="backgroundsCount">-</div>
                    <div class="card-actions">
                        <button class="btn btn-gold" onclick="openModal('backgrounds')">+ Adicionar</button>
                        <button class="btn btn-outline" onclick="viewTable('game_backgrounds')">Ver Todos</button>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="card-header">
                        <div class="card-title"><span class="card-emoji">🗣️</span> Idiomas</div>
                    </div>
                    <div class="card-count" id="languagesCount">-</div>
                    <div class="card-actions">
                        <button class="btn btn-gold" onclick="openModal('languages')">+ Adicionar</button>
                        <button class="btn btn-outline" onclick="viewTable('languages')">Ver Todos</button>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="card-header">
                        <div class="card-title"><span class="card-emoji">🗡️</span> Armas</div>
                    </div>
                    <div class="card-count" id="weaponsCount">-</div>
                    <div class="card-actions">
                        <button class="btn btn-gold" onclick="openModal('weapons')">+ Adicionar</button>
                        <button class="btn btn-outline" onclick="viewTable('game_weapons')">Ver Todos</button>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="card-header">
                        <div class="card-title"><span class="card-emoji">🛡️</span> Armaduras</div>
                    </div>
                    <div class="card-count" id="armorCount">-</div>
                    <div class="card-actions">
                        <button class="btn btn-gold" onclick="openModal('armor')">+ Adicionar</button>
                        <button class="btn btn-outline" onclick="viewTable('game_armor')">Ver Todos</button>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="card-header">
                        <div class="card-title"><span class="card-emoji">🎒</span> Equipamentos</div>
                    </div>
                    <div class="card-count" id="equipmentCount">-</div>
                    <div class="card-actions">
                        <button class="btn btn-gold" onclick="openModal('equipment')">+ Adicionar</button>
                        <button class="btn btn-outline" onclick="viewTable('game_equipment')">Ver Todos</button>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="card-header">
                        <div class="card-title"><span class="card-emoji">✨</span> Talentos</div>
                    </div>
                    <div class="card-count" id="featsCount">-</div>
                    <div class="card-actions">
                        <button class="btn btn-gold" onclick="openModal('feats')">+ Adicionar</button>
                        <button class="btn btn-outline" onclick="viewTable('game_feats')">Ver Todos</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="genericModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Adicionar Item</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <script type="module" src="js/admin-dashboard.js"></script>
</body>

</html>
