<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RPG Player — Sistema de Fichas D&D 5E. Gerencie personagens, mesas e aventuras épicas.">
    <title>RPG Player - Carregando...</title>

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
    <link rel="manifest" href="img/site.webmanifest">
    <link rel="shortcut icon" href="img/favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cinzel', serif;
            background: url('img/plano_de_fundo1.png') center/cover no-repeat fixed;
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 20, 0.85);
            z-index: 1;
        }

        .loading-container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #e8dcc6;
        }

        .logo-section {
            margin-bottom: 40px;
            animation: fadeInScale 1s ease-out;
        }

        .logo-icon {
            width: 120px; height: 120px;
            margin: 0 auto 20px;
            animation: float 3s ease-in-out infinite;
        }

        .logo-icon img {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.8));
        }

        .logo-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 48px; font-weight: 900;
            color: #d4af37;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.8), 0 4px 15px rgba(0, 0, 0, 0.9);
            letter-spacing: 4px; margin-bottom: 10px;
        }

        .logo-subtitle {
            font-size: 18px;
            color: rgba(232, 220, 198, 0.8);
            letter-spacing: 2px; text-transform: uppercase;
        }

        .loading-section { margin-top: 40px; }

        .loading-text {
            font-size: 20px; color: #d4af37;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }

        .loading-bar-container {
            width: 300px; height: 8px;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 10px; overflow: hidden;
            border: 2px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .loading-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #d4af37 0%, #f0c84f 50%, #d4af37 100%);
            animation: loadProgress 2s ease-out forwards;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.8);
        }

        .loading-spinner {
            margin-top: 30px; display: flex; gap: 10px; justify-content: center;
        }

        .spinner-dot {
            width: 12px; height: 12px;
            background: #d4af37; border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
        }
        .spinner-dot:nth-child(2) { animation-delay: -0.32s; }
        .spinner-dot:nth-child(3) { animation-delay: -0.16s; }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        @keyframes loadProgress {
            from { width: 0%; }
            to { width: 100%; }
        }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, ::before, ::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }

        @media (max-width: 768px) {
            .logo-title { font-size: 32px; }
            .logo-icon { width: 80px; height: 80px; }
            .loading-bar-container { width: 250px; }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="logo-section">
            <div class="logo-icon">
                <img src="img/android-chrome-512x512.png" alt="RPG Player">
            </div>
            <h1 class="logo-title">RPG PLAYER</h1>
            <p class="logo-subtitle">Sistema de Fichas D&D 5E</p>
        </div>

        <div class="loading-section">
            <div class="loading-text">Preparando sua aventura...</div>
            <div class="loading-bar-container">
                <div class="loading-bar"></div>
            </div>
            <div class="loading-spinner">
                <div class="spinner-dot"></div>
                <div class="spinner-dot"></div>
                <div class="spinner-dot"></div>
            </div>
        </div>
    </div>

    <!-- FIX #4 — Verificar autenticação Firebase antes de redirecionar -->
    <script type="module">
        import { auth } from './js/firebase-config.js'
        import { onAuthStateChanged } from 'firebase/auth'

        const minDisplayTime = new Promise(resolve => setTimeout(resolve, 1500))
        let redirectTarget = 'login.html'

        const authCheck = new Promise(resolve => {
            const unsubscribe = onAuthStateChanged(auth, (user) => {
                unsubscribe()
                redirectTarget = user ? 'dashboard.html' : 'login.html'
                resolve()
            })
        })

        Promise.all([minDisplayTime, authCheck]).then(() => {
            window.location.href = redirectTarget
        })
    </script>
</body>
</html>
